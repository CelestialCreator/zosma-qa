name: Bug Report
description: Report a bug or unexpected behavior.
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Run `npx zosma-qa init`
        2. Run `pnpm exec playwright test`
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include error messages or screenshots if relevant.
    validations:
      required: true

  - type: dropdown
    id: packages
    attributes:
      label: Affected package(s)
      description: Which package(s) does this affect?
      multiple: true
      options:
        - zosma-qa (CLI entry point)
        - "@zosmaai/zosma-qa-core"
        - "@zosmaai/zosma-qa-playwright"
        - "@zosmaai/zosma-qa-cli"
        - examples/zosma-ai
        - templates/playwright
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "20.x"

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15, Ubuntu 24.04, etc."
